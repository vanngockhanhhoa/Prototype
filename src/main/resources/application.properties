spring.application.name=ash

#PostgreSQL
#spring.datasource.url=jdbc:postgresql://localhost:5432/demo_db
#spring.datasource.username=demo_user
#spring.datasource.password=demo_pass
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=demo_user
spring.datasource.password=demo_pass
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

#Hikari Connection Config
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=100000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=5
#Hikari Connection Config


spring.jpa.hibernate.ddl-auto=update
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# --- Redis ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.database=0

serviceB.url=http://localhost:8081

spring.kafka.bootstrap-servers=localhost:9092

server.port=8080

# ─── Keycloak (mobile clients) ───────────────────────────────────────────────
# Docker: keycloak exposed on host port 8180 (container port 8080)
# If running this Spring Boot app inside Docker, change localhost → keycloak
keycloak.jwk-set-uri=http://localhost:8180/realms/ash/protocol/openid-connect/certs
keycloak.issuer-uri=http://localhost:8180/realms/ash
keycloak.client-id=ash-mobile

# ─── JWT (RS256) ─────────────────────────────────────────────────────────────
# Algorithm : RS256  (RSA-2048)
# Sign      : private key  – server only, never share
# Verify    : public  key  – safe to publish / share with consumers
# Replace keys/private.pem and keys/public.pem before deploying to production.
jwt.private-key=classpath:keys/private.pem
jwt.public-key=classpath:keys/public.pem
jwt.expiration=86400000

logging.level.org.mapstruct=DEBUG

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

